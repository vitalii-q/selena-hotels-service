root = "/app"

[build]
  cmd = "mkdir -p tmp && go build -o tmp/hotels-service main.go && chmod +x tmp/hotels-service"
  bin = "./tmp/hotels-service"
  include_ext = ["go", "sql"]
  
  exclude_dir = [
    "vendor",
    "tmp",
    ".git",
    "_docker/hotels-db-data",
    "logs"
  ]
  
  delay = 3000
  kill_delay = 1000   # wait before restarting process
  stop_on_error = true

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"